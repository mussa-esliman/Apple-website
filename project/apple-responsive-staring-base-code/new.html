<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Carousel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .hero-slide {
      height: 100vh;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }
  </style>
</head>

<body>

<!-- 🔥 CAROUSEL -->
<div id="heroCarousel" class="carousel slide" data-bs-ride="carousel">

  <div class="carousel-inner">

    <!-- Slide 1 -->
    <div class="carousel-item active">
      <div class="hero-slide d-flex align-items-center text-white"
        style="background-image:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4');">

        <div class="overlay"></div>

        <div class="container hero-content text-center">
          <h1 class="display-4 fw-bold">Unlimited Movies</h1>
          <p class="lead">Watch anywhere. Cancel anytime.</p>
          <button class="btn btn-danger btn-lg">Watch Now</button>
        </div>

      </div>
    </div>

    <!-- Slide 2 -->
    <div class="carousel-item">
      <div class="hero-slide d-flex align-items-center text-white"
        style="background-image:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');">

        <div class="overlay"></div>

        <div class="container hero-content text-center">
          <h1 class="display-4 fw-bold">New Releases</h1>
          <p class="lead">Fresh content every week</p>
          <button class="btn btn-danger btn-lg">Explore</button>
        </div>

      </div>
    </div>

    <!-- Slide 3 -->
    <div class="carousel-item">
      <div class="hero-slide d-flex align-items-center text-white"
        style="background-image:url('https://images.unsplash.com/photo-1497032205916-ac775f0649ae');">

        <div class="overlay"></div>

        <div class="container hero-content text-center">
          <h1 class="display-4 fw-bold">Stream Anytime</h1>
          <p class="lead">On any device</p>
          <button class="btn btn-danger btn-lg">Start</button>
        </div>

      </div>
    </div>

  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
